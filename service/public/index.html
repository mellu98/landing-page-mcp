<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #17e6e6, #4f8fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #888;
      margin-bottom: 40px;
      font-size: 14px;
    }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="url"], textarea {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      border-color: #17e6e6;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: inherit;
    }
    .field { margin-bottom: 20px; }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #17e6e6, #4f8fff);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .progress {
      display: none;
      margin-top: 24px;
    }
    .progress.active { display: block; }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      font-size: 14px;
      color: #666;
      border-bottom: 1px solid #1a1a1a;
    }
    .step.active { color: #17e6e6; }
    .step.done { color: #4caf50; }
    .step.error { color: #f44336; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-top-color: #17e6e6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check::before { content: "\2713"; font-weight: bold; }
    .cross::before { content: "\2717"; font-weight: bold; }
    .result {
      display: none;
      margin-top: 24px;
      padding: 24px;
      background: #0d1f0d;
      border: 1px solid #1a3a1a;
      border-radius: 12px;
    }
    .result.active { display: block; }
    .result h3 {
      color: #4caf50;
      margin-bottom: 16px;
    }
    .result a {
      color: #17e6e6;
      text-decoration: none;
    }
    .result a:hover { text-decoration: underline; }
    .result-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .error-box {
      display: none;
      margin-top: 24px;
      padding: 24px;
      background: #1f0d0d;
      border: 1px solid #3a1a1a;
      border-radius: 12px;
      color: #f44336;
    }
    .error-box.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Landing Page Generator</h1>
    <p class="subtitle">Incolla un link AliExpress &rarr; Genera landing page &rarr; Importa su Shopify</p>

    <div class="card">
      <div class="field">
        <label>Link AliExpress</label>
        <input type="url" id="aliUrl" placeholder="https://www.aliexpress.com/item/..." />
      </div>
      <div class="field">
        <label>Istruzioni Copy (opzionale)</label>
        <textarea id="copyInstructions" placeholder="Es: Scrivi in italiano, tono giovane e diretto, focus sui benefici per la pelle..."></textarea>
      </div>
      <button class="btn" id="generateBtn" onclick="generate()">Genera Landing Page</button>
    </div>

    <div class="progress" id="progress">
      <div class="step" id="step1"><div class="spinner"></div> Analisi prodotto AliExpress con AI...</div>
      <div class="step" id="step2"><div class="spinner"></div> Generazione copy persuasivo...</div>
      <div class="step" id="step3"><div class="spinner"></div> Creazione template landing page...</div>
      <div class="step" id="step4"><div class="spinner"></div> Importazione prodotto su Shopify...</div>
      <div class="step" id="step5"><div class="spinner"></div> Caricamento template e assegnazione...</div>
    </div>

    <div class="result" id="result">
      <h3>Landing Page Creata!</h3>
      <div class="result-links" id="resultLinks"></div>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>

  <script>
    async function generate() {
      const url = document.getElementById('aliUrl').value.trim();
      if (!url) return alert('Inserisci un link AliExpress');

      const btn = document.getElementById('generateBtn');
      const progress = document.getElementById('progress');
      const result = document.getElementById('result');
      const errorBox = document.getElementById('errorBox');

      btn.disabled = true;
      progress.classList.add('active');
      result.classList.remove('active');
      errorBox.classList.remove('active');

      // Reset steps
      for (let i = 1; i <= 5; i++) {
        const step = document.getElementById(`step${i}`);
        step.className = 'step';
        step.innerHTML = `<div class="spinner"></div> ${step.textContent.trim()}`;
      }

      try {
        const copyInstructions = document.getElementById('copyInstructions').value.trim();

        // Use EventSource for progress updates
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, copyInstructions }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));

            if (data.step) {
              updateStep(data.step, data.status);
            }
            if (data.result) {
              showResult(data.result);
            }
            if (data.error) {
              throw new Error(data.error);
            }
          }
        }
      } catch (err) {
        errorBox.textContent = `Errore: ${err.message}`;
        errorBox.classList.add('active');
      } finally {
        btn.disabled = false;
      }
    }

    function updateStep(stepNum, status) {
      const step = document.getElementById(`step${stepNum}`);
      const text = step.textContent.trim();
      if (status === 'active') {
        step.className = 'step active';
        step.innerHTML = `<div class="spinner"></div> ${text}`;
      } else if (status === 'done') {
        step.className = 'step done';
        step.innerHTML = `<span class="check"></span> ${text}`;
      } else if (status === 'error') {
        step.className = 'step error';
        step.innerHTML = `<span class="cross"></span> ${text}`;
      }
    }

    function showResult(data) {
      const result = document.getElementById('result');
      const links = document.getElementById('resultLinks');
      result.classList.add('active');
      links.innerHTML = `
        <p><strong>Prodotto:</strong> ${data.productTitle}</p>
        <p><a href="${data.adminUrl}" target="_blank">Apri in Shopify Admin &rarr;</a></p>
        <p><a href="${data.productUrl}" target="_blank">Vedi Landing Page &rarr;</a></p>
        <p><strong>Template:</strong> ${data.templateName}</p>
      `;
    }
  </script>
</body>
</html>
